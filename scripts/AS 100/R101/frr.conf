configure
!
interface lo
    ip address 5.170.0.101/32
!
interface eth0
    ip address 10.1.1.1/30
!
interface eth1
    ip address 10.0.11.1/30
!
router ospf
    router-id 5.170.0.101
    network 5.170.0.101/32 area 0
    network 10.0.11.0/30 area 0
    exit
!
mpls ldp
    router-id 5.170.0.101
    ordered-control
    address-family ipv4
        discovery transport-address 5.170.0.101
        interface eth1
        interface lo
        exit-address-family
    exit
!
router bgp 100
    bgp router-id 5.170.0.101
    neighbor 5.170.0.102 remote-as 100
    neighbor 5.170.0.102 update-source lo
    neighbor 5.170.0.103 remote-as 100
    neighbor 5.170.0.103 update-source lo
    address-family ipv4 unicast
        neighbor 5.170.0.102 next-hop-self
        neighbor 5.170.0.103 next-hop-self
        exit-address-family
    exit    
end
