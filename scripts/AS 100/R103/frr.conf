frr version 10.5.0
frr defaults datacenter
hostname R103
log syslog informational
service integrated-vtysh-config
!
ip route 10.1.3.2/32 eth0
!
interface eth0
 ip address 10.1.3.1/30
exit
!
interface eth1
 ip address 10.0.11.2/30
exit
!
interface eth2
 ip address 10.0.11.10/30
exit
!
interface lo
 ip address 5.170.0.103/32
exit
!
router bgp 100
 bgp router-id 5.170.0.103
 neighbor 5.170.0.101 remote-as 100
 neighbor 5.170.0.101 update-source 5.170.0.103
 neighbor 5.170.0.102 remote-as 100
 neighbor 5.170.0.102 update-source 5.170.0.103
 !
 address-family ipv4 unicast
  network 10.1.3.2/32
  neighbor 5.170.0.101 next-hop-self
  neighbor 5.170.0.102 next-hop-self
 exit-address-family
exit
!
router ospf
 ospf router-id 5.170.0.103
 network 5.170.0.103/32 area 0
 network 10.0.11.0/30 area 0
 network 10.0.11.8/30 area 0
exit
!