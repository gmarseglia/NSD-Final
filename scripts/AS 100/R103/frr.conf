configure
!
interface lo
    ip address 5.170.0.103/32
!
interface eth0
    ip address 10.0.3.1/30
!
interface eth3
    ip address 10.0.11.10/30
!
router ospf
    router-id 5.170.0.103
    network 5.170.0.103/32 area 0
    network 10.0.11.8/30 area 0
    exit
!
mpls ldp
    router-id 5.170.0.103
    ordered-control
    address-family ipv4
        discovery transport-address 5.170.0.103
        interface eth3
        interface lo
        exit-address-family
    exit
!
router bgp 100
    bgp router-id 5.170.0.103
    neighbor 5.170.0.101 remote-as 100
    neighbor 5.170.0.101 update-source lo
    neighbor 5.170.0.102 remote-as 100
    neighbor 5.170.0.102 update-source lo
    address-family ipv4 unicast
        neighbor 5.170.0.101 next-hop-self
        neighbor 5.170.0.102 next-hop-self
        exit-address-family
    exit  
end
