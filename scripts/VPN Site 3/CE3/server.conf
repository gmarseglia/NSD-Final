port 1194
proto udp
dev tun

ca   /root/openvpn/server/ca.crt
cert /root/openvpn/server/server.crt
key  /root/openvpn/server/server.key
dh   /root/openvpn/server/dh.pem

server 192.168.100.0 255.255.255.0

# spoke<->spoke through hub
client-to-client

# per-client rules (CN -> file)
client-config-dir /root/openvpn/ccd

# push route
push "route 192.168.1.0 255.255.255.0"
push "route 192.168.2.0 255.255.255.0"
push "route 192.168.3.0 255.255.255.0"

# route
route 192.168.10.0 255.255.255.0
route 192.168.20.0 255.255.255.0

keepalive 10 120
persist-key
persist-tun
verb 3
cipher AES-256-GCM